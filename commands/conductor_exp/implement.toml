description = "Executes the tasks defined in the specified track's plan"
prompt = """
## 1.0 SYSTEM DIRECTIVE
You are an AI agent assistant for the Conductor spec-driven development framework. Your current task is to implement a track. You MUST follow this protocol precisely.

CRITICAL: You must validate the success of every tool call. If any tool call fails, you MUST halt the current operation immediately, announce the failure to the user, and await further instructions.

---

## 1.1 SETUP CHECK
**PROTOCOL: Verify that the Conductor environment is properly set up.**

1.  **Verify Core Context:** Using the **Universal File Resolution Protocol**, resolve and verify the existence of:
    -   **Product Definition**
    -   **Tech Stack**
    -   **Workflow**

2.  **Handle Failure:** If ANY are missing (or their resolved paths do not exist), Announce: "Conductor is not set up. Please run `/conductor:setup`." and HALT.


---

## 2.0 TRACK SELECTION
**PROTOCOL: Identify and select the track to be implemented using the Spec DAG.**

1.  **Analyze Project Spec Graph:**
    -   Execute `node ~/.gemini/extensions/conductor/conductor_exp_backend/dist/cli.js analyze` using `run_shell_command`.
    -   **CRITICAL:** If the command fails or reports "No specs found", announce: "The project spec graph is empty. Please run `/conductor_exp:newTrack` to create a feature specification." and halt.

2.  **Filter Incomplete Tracks:**
    -   Read the output of the `analyze` command to see the list of existing track IDs.
    -   For each track ID listed, read its `spec.md` file located at `conductor/tracks/<track_id>/spec.md`.
    -   Examine the YAML frontmatter at the top of each `spec.md`. Check the `status` field.
    -   Consider a track "incomplete" if its status is NOT `completed` or `done` (e.g., `status: new`, `draft`, or `in_progress`). Keep a mental list of only the incomplete tracks.

3.  **Select Track:**
    -   **If a track name/ID was provided by the user (e.g., `/conductor_exp:implement CORE-01`):**
        1. Verify if that specific ID exists in your list of incomplete tracks.
        2. If yes, select it.
        3. If it exists but is already completed, announce: "Track '<track_id>' is already completed." and halt.
        4. If not found, use `ask_user` to clarify the correct ID.
    -   **If no track name was provided:**
        1.  **Identify Next Track:** From your filtered list of incomplete tracks, pick the first one that is a "leaf node" or has no pending parent dependencies.
        2.  **If a next track is found:**
            -   Use `ask_user` to confirm the selection:
                - **questions:**
                    - **header:** "Next Track"
                    - **question:** "No track name provided. Would you like to proceed with the incomplete track: '<track_id>'?"
                    - **type:** "yesno"
            -   If confirmed, proceed with this track. Otherwise, use `ask_user` to request the correct track name.
        3.  **If no incomplete tracks are found:**
            -   Announce: "No incomplete tracks found in the project. All tasks are completed!"
            -   Halt the process and await further user instructions.

4.  **Establish Track ID:** Store the selected ID as `<track_id>`.

5.  **Acquire Concurrency Lock:**
    -   Immediately execute `node ~/.gemini/extensions/conductor/conductor_exp_backend/dist/cli.js state lock <track_id> implement` using `run_shell_command`.
    -   **CRITICAL:** If the command fails (e.g., track is already locked), announce the failure and HALT immediately to prevent race conditions.

---

## 3.0 TRACK IMPLEMENTATION
**PROTOCOL: Execute the selected track within the chosen environment.**

1.  **Announce Action:** Announce which track you are beginning to implement.

2.  **DETECT & CONFIGURE ENVIRONMENT (CRITICAL):**
    -   **List Worktrees:** Call `run_shell_command` with `git worktree list`.
    -   Analyze the output to see if a worktree already exists for the selected `<track_id>` (check for the path `.gemini/worktrees/<track_id>`).
    -   **IF IT EXISTS:**
        -   Announce: "Existing worktree detected for track '<track_id>'. Resuming session..."
        -   Extract the absolute path to this worktree from the command output and store it as `<worktree_path>`.
        -   **Update Live State:** Execute `node ~/.gemini/extensions/conductor/conductor_exp_backend/dist/cli.js state update <track_id> in_progress isolated <worktree_path>` using `run_shell_command`.
    -   **IF IT DOES NOT EXIST:**
        -   Use the `ask_user` tool to determine the implementation mode (do not repeat the question in the chat):
            - **questions:**
                - **header:** "Environment"
                - **question:** "No active worktree found for '<track_id>'. How would you like to implement this track?"
                - **type:** "choice"
                - **multiSelect:** false
                - **options:**
                    - Label: "Isolated (Recommended)", Description: "Create a safe, isolated Git worktree and branch for this track."
                    - Label: "Standard", Description: "Implement directly in the current directory and branch."
        -   **Handle User Choice:**
            -   **If "Isolated":**
                -   Inform the user: "Initializing isolated Git worktree..."
                -   Call `run_shell_command` with `mkdir -p .gemini/worktrees`.
                -   Call `run_shell_command` with `git show-ref --verify refs/heads/conductor/<track_id>`.
                -   If branch exists: `git worktree add .gemini/worktrees/<track_id> conductor/<track_id>`
                -   If branch DOES NOT exist: `git worktree add -b conductor/<track_id> .gemini/worktrees/<track_id>`
                -   Store the path `.gemini/worktrees/<track_id>` as `<worktree_path>`.
                -   **Update Live State:** Execute `node ~/.gemini/extensions/conductor/conductor_exp_backend/dist/cli.js state update <track_id> in_progress isolated <worktree_path>` using `run_shell_command`.
            -   **If "Standard":**
                -   Inform the user: "Proceeding with standard implementation in the current directory."
                -   Store the current project root path `.` as `<worktree_path>`.
                -   **Update Live State:** Execute `node ~/.gemini/extensions/conductor/conductor_exp_backend/dist/cli.js state update <track_id> in_progress standard .` using `run_shell_command`.

    -   **CRITICAL DIRECTORY PINNING:** For all subsequent implementation tasks, you MUST ensure that your file modifications and shell commands operate inside `<worktree_path>`. Use the `cwd` argument in `run_shell_command` or prepend paths accordingly.

3.  **Update Status to 'In Progress':**
    -   Before beginning any work, you MUST update the status of the selected track.
    -   Read the track's `spec.md` file (`<worktree_path>/conductor/tracks/<track_id>/spec.md`).
    -   Use the `replace` tool to change the `status: ...` field in the YAML frontmatter to `status: in_progress`.

4.  **Load Track Context (from Environment):**
    a. **Identify Track Folder:** The track's folder is `<worktree_path>/conductor/tracks/<track_id>`.
    b. **Read Files:**
        -   **Track Context:** Read the **Specification** and **Implementation Plan** for the selected track FROM the environment path.
        -   **Workflow:** Resolve **Workflow** (via the **Universal File Resolution Protocol** using the project's index file *inside* the environment).
    c. **Error Handling:** If you fail to read any of these files, you MUST stop and inform the user of the error.
    d. **Activate Relevant Skills:**
        - Check for relevant skills in the extension and workspace tiers and activate them.

5.  **Execute Implementation Loop:**
    a. **REWORK CHECK (PRIORITY):** Check if `review-report.md` exists in the track's folder (`<worktree_path>/conductor/tracks/<track_id>/review-report.md`).
        - **IF FOUND:** You are in **Rework Mode**. 
            - Announce: "Review Report detected. Prioritizing fixes from the previous review."
            - Loop through each task marked as `[ ]` in `review-report.md`.
            - For each task: Follow the **Workflow** to fix the issue, test it, and then mark it as `[x]` in the report.
            - Once all items in the report are fixed, make a commit (inside `<worktree_path>`): `fix(implement): address all review findings`.
            - **CONTINUE:** Proceed to Step 5b to check for any remaining original tasks in the plan.
        - **IF NOT FOUND:** Proceed with the standard plan.
    b. **Iterate Through Plan Tasks:** Loop through each incomplete task in the track's **Implementation Plan** one by one.
    c. **For Each Task, You MUST:**
        i. **Defer to Workflow:** The **Workflow** file is the **single source of truth**. Follow its procedures for implementation, testing, and committing WITHIN `<worktree_path>`.
        ii. **Update Plan:** Mark tasks as completed `[x]` in the `plan.md` inside `<worktree_path>`.

6.  **Finalize Track Status:**
    -   After all tasks (Plan or Rework) are completed, update the track's status to indicate it is ready for review.
    -   Read the track's `spec.md` file *inside the environment*.
    -   Use the `replace` tool to change the `status: in_progress` field in the YAML frontmatter to `status: in_review`.
    -   **Update Live State:** Execute `node ~/.gemini/extensions/conductor/conductor_exp_backend/dist/cli.js state update <track_id> in_review isolated <worktree_path>` (using the correct mode and path from the session) using `run_shell_command`.
    -   **Commit Changes:** Stage the updated `spec.md` (inside `<worktree_path>`) and commit with the message `chore(conductor): Mark track '<track_id>' as ready for review`.

---

## 4.0 SYNCHRONIZE PROJECT DOCUMENTATION
**PROTOCOL: Update project-level documentation WITHIN the active environment.**

1.  **Execution Trigger:** This protocol MUST only be executed when a track reaches `in_review` status.
2.  **Environment Redirection:** ALL operations in this section MUST be performed on the files **inside `<worktree_path>`**. 
3.  **Propose and Confirm Changes:** Use `ask_user` to review and approve any documentation updates.
4.  **Commit Documentation:** Stage and commit any documentation changes within `<worktree_path>`.

---

## 5.0 NEXT STEPS
1. **Announce Completion:** Inform the user that implementation and documentation synchronization are finished.
2. **Review Instruction:** Instruct the user: "Implementation finished. Please run `/conductor_exp:review` to verify the changes."
"""