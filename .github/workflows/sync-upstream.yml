name: Sync Upstream

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      upstream:
        description: 'Specific upstream to sync (optional)'
        required: false
        default: ''
      dry_run:
        description: 'Run in dry-run mode'
        required: false
        default: 'false'
      create_pr:
        description: 'Create PR for changes'
        required: false
        default: 'true'

env:
  PYTHON_VERSION: '3.12'

jobs:
  sync-upstream:
    name: Sync from Upstream Repositories
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub requests

      - name: Run upstream sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running upstream sync..."
          
          # Build arguments
          ARGS="--target edithatogo/conductor-next"
          
          if [ -n "${{ github.event.inputs.upstream }}" ]; then
            ARGS="$ARGS --upstream ${{ github.event.inputs.upstream }}"
          fi
          
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          
          # Run sync
          python scripts/sync_upstream.py $ARGS
          
      - name: Upload sync state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-state
          path: .github/sync_state.json
          retention-days: 30

      - name: Generate sync report
        if: always()
        run: |
          echo "# Upstream Sync Report" > sync-report.md
          echo "" >> sync-report.md
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> sync-report.md
          echo "" >> sync-report.md
          
          if [ -f .github/sync_state.json ]; then
            echo "## Sync State" >> sync-report.md
            echo "" >> sync-report.md
            echo '```json' >> sync-report.md
            cat .github/sync_state.json >> sync-report.md
            echo '```' >> sync-report.md
          fi
          
          echo "" >> sync-report.md
          echo "## Workflow Run" >> sync-report.md
          echo "" >> sync-report.md
          echo "- Run ID: ${{ github.run_id }}" >> sync-report.md
          echo "- Run Number: ${{ github.run_number }}" >> sync-report.md
          echo "- Trigger: ${{ github.event_name }}" >> sync-report.md
          
      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-report
          path: sync-report.md
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Upstream sync failed. Check workflow run for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
